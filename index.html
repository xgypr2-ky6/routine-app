<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Health v2</title>
<style>
body { font-family: sans-serif; padding:20px; background:#fff6f8; }
button, select, input { font-size:16px; padding:10px; margin:5px 0; }
.symptom-btn {
  display:inline-block; padding:10px 14px; margin:4px;
  border:1px solid #ccc; border-radius:20px; background:#fff; cursor:pointer;
}
.symptom-btn.selected { background:#ffdce5; border-color:#e7a8b8; }
.row { margin-bottom: 14px; }
</style>
</head>
<body>

<h2>動作確認ページ v2</h2>
<p>症状を「button」で作った版です。</p>

<div class="row">
  <h3>周期</h3>
  <select id="cycle">
    <option value="">選択</option>
    <option>生理中</option>
    <option>前っぽい</option>
    <option>排卵期っぽい</option>
    <option>安定</option>
  </select>
</div>

<div class="row">
  <h3>体調</h3>
  <select id="condition">
    <option value="">選択</option>
    <option>元気</option>
    <option>普通</option>
    <option>だるい</option>
    <option>しんどい</option>
  </select>
</div>

<div class="row">
  <h3>症状</h3>
  <div id="symptoms"></div>
</div>

<div class="row">
  <input id="custom" placeholder="症状追加">
  <button id="addBtn" type="button">追加</button>
</div>

<div class="row">
  <h3>選択済み</h3>
  <div id="selected"></div>
</div>

<div class="row">
  <button id="saveBtn" type="button">登録</button>
</div>

<script>
let baseSymptoms = ["頭痛","胃痛","吐き気","腹痛","眠気","だるさ","イライラ","腰痛"];
let selected = [];

function render() {
  const box = document.getElementById("symptoms");
  box.innerHTML = "";
  baseSymptoms.forEach((s) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "symptom-btn" + (selected.includes(s) ? " selected" : "");
    btn.textContent = s;
    btn.addEventListener("click", () => {
      if (selected.includes(s)) {
        selected = selected.filter(x => x !== s);
      } else {
        selected.push(s);
      }
      render();
    });
    box.appendChild(btn);
  });

  const sel = document.getElementById("selected");
  sel.innerHTML = "";
  selected.forEach((s) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "symptom-btn selected";
    btn.textContent = s + " ×";
    btn.addEventListener("click", () => {
      selected = selected.filter(x => x !== s);
      render();
    });
    sel.appendChild(btn);
  });
}

document.getElementById("addBtn").addEventListener("click", () => {
  const input = document.getElementById("custom");
  const val = input.value.trim();
  if (!val) return;
  if (!baseSymptoms.includes(val)) baseSymptoms.push(val);
  input.value = "";
  render();
});

document.getElementById("saveBtn").addEventListener("click", () => {
  alert("保存されたよ！");
});

render();
</script>

</body>
</html>
