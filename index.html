<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#fff6f8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Health Debug">
<title>Health Debug v3</title>
<link rel="manifest" href="./manifest.json?v=20260406debug3">
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:#fff6f8;margin:0;padding:18px;color:#4d4038}
.wrap{max-width:460px;margin:0 auto}
.card{background:#fff;border:1px solid #eedfd7;border-radius:22px;padding:16px;margin-bottom:14px;box-shadow:0 8px 20px rgba(125,96,82,.06)}
h1,h2,h3{margin:0 0 12px}
button,input{font-size:16px}
button{border:1px solid #ecdcd5;background:#fff;border-radius:16px;padding:12px 14px;cursor:pointer}
.primary{background:#fdeef4}
.row{display:flex;gap:8px;flex-wrap:wrap}
.period-btn{min-width:140px}
.period-btn.selected{background:#fdeef4;border-color:#e7a8b8}
.custom-pill{display:flex;justify-content:space-between;align-items:center;border:1px solid #ecdcd5;border-radius:16px;padding:10px 12px;background:#fff;margin-bottom:8px}
input[type="text"]{width:100%;border:1px solid #ecdcd4;border-radius:16px;padding:12px;background:#fff;margin-bottom:10px;min-height:46px}
.small{font-size:12px;color:#85756d}
.sheet-overlay{position:fixed;inset:0;background:rgba(77,64,56,.28);display:none;align-items:flex-end;justify-content:center;z-index:40;padding:0;pointer-events:none}
.sheet-overlay.show{display:flex;pointer-events:auto}
.sheet-card{width:min(460px,100%);background:#fff;border-radius:24px 24px 0 0;padding:18px 16px 28px;border:1px solid #ecdcd4;box-shadow:0 -10px 30px rgba(125,96,82,.18)}
.sheet-option{width:100%;text-align:left;border:1px solid #ecdcd5;background:#fff;border-radius:16px;padding:12px 14px;margin-bottom:10px;font-size:16px}
.sheet-option.selected{background:#fdeef4;border-color:#e7a8b8}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:20px;background:#4d4038;color:#fff;padding:12px 16px;border-radius:999px;opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>デバッグ版 v3</h1>
    <div class="small">今回は3項目だけに絞っています。</div>
  </div>

  <div class="card">
    <h2>1. 周期ボタン</h2>
    <div id="cycleButtons" class="row"></div>
    <div id="cycleResult" class="small">未選択</div>
  </div>

  <div class="card">
    <h2>2. 体調選択シート</h2>
    <button id="conditionOpen" type="button">体調を選ぶ</button>
    <div id="conditionResult" class="small" style="margin-top:8px">未選択</div>
  </div>

  <div class="card">
    <h2>3. 追加症状の削除</h2>
    <input id="customSymptom" type="text" placeholder="症状追加">
    <button id="addSymptom" class="primary" type="button">症状を追加する</button>
    <div id="customList" style="margin-top:12px"></div>
  </div>
</div>

<div id="conditionSheet" class="sheet-overlay">
  <div class="sheet-card">
    <h3>体調を選ぶ</h3>
    <div id="conditionOptions"></div>
    <button id="closeSheet" type="button">閉じる</button>
  </div>
</div>

<div id="toast" class="toast">保存しました</div>

<script>
const cycles = ["生理中","前っぽい","排卵期っぽい","安定"];
const conditions = ["元気","普通","だるい","しんどい"];
let selectedCycle = "";
let selectedCondition = "";
let customSymptoms = JSON.parse(localStorage.getItem("debug_v3_custom") || "[]");

function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>t.classList.remove("show"), 1600);
}

function renderCycles(){
  const box = document.getElementById("cycleButtons");
  box.innerHTML = "";
  cycles.forEach(v => {
    const b = document.createElement("button");
    b.type = "button";
    b.className = "period-btn" + (selectedCycle === v ? " selected" : "");
    b.textContent = v;
    b.addEventListener("click", () => {
      selectedCycle = v;
      renderCycles();
      document.getElementById("cycleResult").textContent = "選択中: " + v;
      toast("周期を選択しました");
    });
    box.appendChild(b);
  });
}

function renderConditionOptions(){
  const box = document.getElementById("conditionOptions");
  box.innerHTML = "";
  conditions.forEach(v => {
    const b = document.createElement("button");
    b.type = "button";
    b.className = "sheet-option" + (selectedCondition === v ? " selected" : "");
    b.textContent = v;
    b.addEventListener("click", () => {
      selectedCondition = v;
      document.getElementById("conditionResult").textContent = "選択中: " + v;
      document.getElementById("conditionSheet").classList.remove("show");
      renderConditionOptions();
      toast("体調を選択しました");
    });
    box.appendChild(b);
  });
}

function renderCustomSymptoms(){
  const box = document.getElementById("customList");
  box.innerHTML = "";
  if(customSymptoms.length === 0){
    box.innerHTML = '<div class="small">まだありません</div>';
    return;
  }
  customSymptoms.forEach(v => {
    const row = document.createElement("div");
    row.className = "custom-pill";
    row.innerHTML = `<span>${v}</span><button type="button">削除</button>`;
    row.querySelector("button").addEventListener("click", () => {
      customSymptoms = customSymptoms.filter(x => x !== v);
      localStorage.setItem("debug_v3_custom", JSON.stringify(customSymptoms));
      renderCustomSymptoms();
      toast("症状を削除しました");
    });
    box.appendChild(row);
  });
}

document.getElementById("conditionOpen").addEventListener("click", () => {
  document.getElementById("conditionSheet").classList.add("show");
});
document.getElementById("closeSheet").addEventListener("click", () => {
  document.getElementById("conditionSheet").classList.remove("show");
});
document.getElementById("conditionSheet").addEventListener("click", (e) => {
  if(e.target.id === "conditionSheet"){
    document.getElementById("conditionSheet").classList.remove("show");
  }
});

document.getElementById("addSymptom").addEventListener("click", () => {
  const input = document.getElementById("customSymptom");
  const v = input.value.trim();
  if(!v) return;
  if(!customSymptoms.includes(v)) customSymptoms.push(v);
  localStorage.setItem("debug_v3_custom", JSON.stringify(customSymptoms));
  input.value = "";
  renderCustomSymptoms();
  toast("症状を追加しました");
});

renderCycles();
renderConditionOptions();
renderCustomSymptoms();
</script>
</body>
</html>
